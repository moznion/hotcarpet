name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # to comment on a pull request using octocov
      contents: write # to store the reports in the octocov-reports branch using octocov
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview # llvm-tools-preview is required by cargo-llvm-cov

      - name: Cache cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-llvm-cov

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      # Runs the tests and emits an LCOV report for octocov in one pass.
      - name: Test & measure coverage (cargo-llvm-cov -> LCOV)
        run: cargo llvm-cov --locked --all-targets --lcov --output-path coverage.lcov

      # Passes the LCOV report to octocov so it can comment on pull requests and
      # store the coverage report in the octocov-reports datastore branch.
      - name: Run octocov
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1
        with:
          config: .octocov.yml
